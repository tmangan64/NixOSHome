# SOPS Configuration
# Replace the placeholder keys below with your actual age public keys.

keys:
  # Your workstation age key
  # Generate: age-keygen -o ~/.config/sops/age/keys.txt
  # Copy the PUBLIC key (age1...) here:
  - &user_key age1xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

  # Server's SSH host key converted to age format
  # Run this command after first boot:
  #     ssh-keyscan -p 2266 <server-ip> | ssh-to-age
  - &host_homeserver age1xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

creation_rules:
  - path_regex: secrets/secrets\.yaml$
    key_groups:
      - age:
          - *user_key
          - *host_homeserver
