# Authentik Blueprint: Household SSO Setup
# This blueprint creates the core structure for household identity management.
# Users are created here but passwords must be set via the UI or recovery flow.

version: 1
metadata:
  name: Household SSO Setup
  labels:
    blueprints.goauthentik.io/description: "Core household identity infrastructure"

entries:
  # ============================================================================
  # GROUPS
  # ============================================================================

  - model: authentik_core.group
    id: group-household-admins
    attrs:
      name: Household Admins
      is_superuser: false
    identifiers:
      name: Household Admins

  - model: authentik_core.group
    id: group-household-members
    attrs:
      name: Household Members
      is_superuser: false
    identifiers:
      name: Household Members

  # ============================================================================
  # USERS
  # Add your household members here. Passwords are set via recovery flow.
  # ============================================================================

  # Example user - customize or add more as needed
  # - model: authentik_core.user
  #   id: user-example
  #   attrs:
  #     username: example
  #     name: Example User
  #     email: example@home
  #     is_active: true
  #     groups:
  #       - !Find [authentik_core.group, [name, Household Members]]
  #   identifiers:
  #     username: example

  # ============================================================================
  # CERTIFICATE (for signing tokens)
  # ============================================================================

  - model: authentik_crypto.certificatekeypair
    id: cert-signing
    attrs:
      name: Household SSO Signing Certificate
      certificate_data: "" # Auto-generated if empty
      key_data: ""
    identifiers:
      name: Household SSO Signing Certificate
    state: created # Only create if doesn't exist

  # ============================================================================
  # OAUTH2/OIDC PROVIDER FOR NEXTCLOUD
  # ============================================================================

  - model: authentik_providers_oauth2.oauth2provider
    id: provider-nextcloud
    attrs:
      name: Nextcloud
      authentication_flow:
        !Find [authentik_flows.flow, [slug, default-authentication-flow]]
      authorization_flow:
        !Find [
          authentik_flows.flow,
          [slug, default-provider-authorization-implicit-consent],
        ]
      client_type: confidential
      client_id: nextcloud
      client_secret: !Env [AUTHENTIK_NEXTCLOUD_CLIENT_SECRET, null]
      # Internal (.home) and external (DuckDNS) redirect URIs
      # Replace YOURSUBDOMAIN with your actual DuckDNS subdomain
      redirect_uris: |
        https://nas.home/apps/oidc/oidc
        https://nas.home/apps/user_oidc/code
        https://cloud.barnsfold.duckdns.org/apps/oidc/oidc
        https://cloud.barnsfold.duckdns.org/apps/user_oidc/code
      signing_key:
        !Find [
          authentik_crypto.certificatekeypair,
          [name, Household SSO Signing Certificate],
        ]
      access_token_validity: hours=1
      refresh_token_validity: days=30
      sub_mode: hashed_user_id
      include_claims_in_id_token: true
      property_mappings:
        - !Find [
            authentik_providers_oauth2.scopemapping,
            [managed, goauthentik.io/providers/oauth2/scope-email],
          ]
        - !Find [
            authentik_providers_oauth2.scopemapping,
            [managed, goauthentik.io/providers/oauth2/scope-openid],
          ]
        - !Find [
            authentik_providers_oauth2.scopemapping,
            [managed, goauthentik.io/providers/oauth2/scope-profile],
          ]
    identifiers:
      name: Nextcloud

  # ============================================================================
  # APPLICATION: NEXTCLOUD
  # ============================================================================

  - model: authentik_core.application
    id: app-nextcloud
    attrs:
      name: Nextcloud
      slug: nextcloud
      provider:
        !Find [authentik_providers_oauth2.oauth2provider, [name, Nextcloud]]
      meta_launch_url: https://nas.home
      meta_description: "Household file storage and collaboration"
      policy_engine_mode: any
    identifiers:
      slug: nextcloud
