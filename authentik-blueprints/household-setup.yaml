# Authentik Blueprint: Household SSO Setup
# Forward auth configuration for Caddy reverse proxy

version: 1
metadata:
  name: Household SSO Setup
  labels:
    blueprints.goauthentik.io/description: "Core household identity infrastructure"

entries:
  # ============================================================================
  # GROUPS
  # ============================================================================

  - model: authentik_core.group
    identifiers:
      name: Household Admins
    attrs:
      name: Household Admins
      is_superuser: false

  - model: authentik_core.group
    identifiers:
      name: Household Members
    attrs:
      name: Household Members
      is_superuser: false

  # ============================================================================
  # PROXY PROVIDERS (Forward Auth mode for Caddy)
  # ============================================================================

  - model: authentik_providers_proxy.proxyprovider
    identifiers:
      name: Nextcloud Internal
    attrs:
      name: Nextcloud Internal
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      mode: forward_single
      external_host: https://nas.home

  - model: authentik_providers_proxy.proxyprovider
    identifiers:
      name: Nextcloud External
    attrs:
      name: Nextcloud External
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      mode: forward_single
      external_host: https://cloud.barnsfold.duckdns.org

  # ============================================================================
  # APPLICATIONS
  # ============================================================================

  - model: authentik_core.application
    identifiers:
      slug: nextcloud-internal
    attrs:
      name: Nextcloud
      slug: nextcloud-internal
      provider: !Find [authentik_providers_proxy.proxyprovider, [name, Nextcloud Internal]]
      meta_launch_url: https://nas.home
      policy_engine_mode: any

  - model: authentik_core.application
    identifiers:
      slug: nextcloud-external
    attrs:
      name: Nextcloud External
      slug: nextcloud-external
      provider: !Find [authentik_providers_proxy.proxyprovider, [name, Nextcloud External]]
      meta_launch_url: https://cloud.barnsfold.duckdns.org
      policy_engine_mode: any
